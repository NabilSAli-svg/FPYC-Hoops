<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:10px;">
  <div class="row" style="gap:10px;">
    <div style="flex:1;">
      <div style="height:64px; background:var(--status-live); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.08em;">Live</div>
      <div class="hex" style="margin-top:6px;">#E87722</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px; background:var(--status-win); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.08em;">Win</div>
      <div class="hex" style="margin-top:6px;">#1F8A5B</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px; background:var(--status-loss); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.08em;">Loss</div>
      <div class="hex" style="margin-top:6px;">#C8102E</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px; background:var(--status-warning); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--court-navy); font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.08em;">Warn</div>
      <div class="hex" style="margin-top:6px;">#E0A800</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px; background:var(--status-info); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.08em;">Info</div>
      <div class="hex" style="margin-top:6px;">#2A6FDB</div>
    </div>
  </div>
</div>
</body></html>
