<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px;">
  <div class="row" style="gap:14px;">
    <div style="flex:1;">
      <div style="height:88px; background:var(--basketball-orange); border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:12px; color:#fff;">
        <div>
          <div style="font-family:var(--font-display); text-transform:uppercase; font-size:16px; letter-spacing:0.04em;">Basketball Orange</div>
          <div class="hex" style="color:rgba(255,255,255,0.85);">#E87722 · --basketball-orange</div>
        </div>
      </div>
    </div>
    <div style="flex:1;">
      <div style="height:88px; background:var(--foul-red); border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:12px; color:#fff;">
        <div>
          <div style="font-family:var(--font-display); text-transform:uppercase; font-size:16px; letter-spacing:0.04em;">Foul Red</div>
          <div class="hex" style="color:rgba(255,255,255,0.85);">#C8102E · --foul-red</div>
        </div>
      </div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--fg-muted); line-height:1.5;">
    Orange is reserved for the basketball glyph and the LIVE state. Red is destructive/foul only. Neither replaces gold as a primary accent.
  </div>
</div>
</body></html>
