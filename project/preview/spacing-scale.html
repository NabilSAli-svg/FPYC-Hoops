<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:8px;">

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:4px; height:24px; background:var(--court-navy);"></div><div class="hex">4</div><div class="token">1</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:8px; height:24px; background:var(--court-navy);"></div><div class="hex">8</div><div class="token">2</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:12px; height:24px; background:var(--court-navy);"></div><div class="hex">12</div><div class="token">3</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:16px; height:24px; background:var(--court-navy);"></div><div class="hex">16</div><div class="token">4</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:24px; height:24px; background:var(--court-navy);"></div><div class="hex">24</div><div class="token">5</div></div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:64px; height:24px; background:var(--court-navy);"></div><div class="hex">64</div><div class="token">8</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:96px; height:24px; background:var(--court-navy);"></div><div class="hex">96</div><div class="token">9</div></div>
  </div>
  <div class="meta" style="margin-top:6px;">4px base grid · --space-1 → --space-9</div>
</div>
</body></html>
