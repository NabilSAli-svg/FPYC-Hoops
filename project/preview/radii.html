<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="flex-direction:row; align-items:flex-end; gap:18px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
    <div style="width:76px; height:60px; background:var(--court-navy); border-radius:4px;"></div>
    <div class="meta">sm · 4</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
    <div style="width:76px; height:60px; background:var(--court-navy); border-radius:8px;"></div>
    <div class="meta">md · 8</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
    <div style="width:76px; height:60px; background:var(--court-navy); border-radius:14px;"></div>
    <div class="meta">lg · 14</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
    <div style="width:120px; height:36px; background:var(--court-navy); border-radius:999px;"></div>
    <div class="meta">pill · 999</div>
  </div>
  <div style="flex:1; border-left:1px solid var(--border); padding-left:18px; align-self:stretch; display:flex; flex-direction:column; justify-content:center;">
    <div class="meta" style="margin-bottom:4px;">Defaults</div>
    <div style="font-size:12px; color:var(--fg-soft);">md on buttons & cards. pill on chips & status. lg on hero. No xl blobs.</div>
  </div>
</div>
</body></html>
