<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:8px;">
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-display); font-size:56px; line-height:1; text-transform:uppercase; color:var(--court-navy);">H1 56</div>
    <div class="token">Anton · 56/60</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-display); font-size:40px; line-height:1; text-transform:uppercase; color:var(--court-navy);">H2 40</div>
    <div class="token">Anton · 40/46</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-body); font-weight:700; font-size:24px; color:var(--fg);">H3 24 bold</div>
    <div class="token">DM Sans 700 · 24/32</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-body); font-weight:700; font-size:18px; color:var(--fg);">H4 18 bold</div>
    <div class="token">DM Sans 700 · 18/26</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-body); font-weight:700; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-muted);">Eyebrow 12</div>
    <div class="token">DM Sans 700 · uppercase tracked</div>
  </div>
</div>
</body></html>
