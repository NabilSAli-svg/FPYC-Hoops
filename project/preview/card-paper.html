<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:transparent; padding:20px;">
  <div style="background:#fff; border:1px solid var(--court-lines); border-radius:8px; box-shadow:0 1px 2px rgba(10,31,61,0.06); padding:18px;">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px;">
      <div>
        <div class="meta">Sat, Dec 7 · 10:00 AM</div>
        <div style="font-family:var(--font-display); text-transform:uppercase; font-size:28px; line-height:1; color:var(--court-navy); margin-top:6px;">Hawks vs. Storm</div>
        <div style="font-size:13px; color:var(--fg-soft); margin-top:4px;">Robinson Secondary · Gym B</div>
      </div>
      <span style="font-family:var(--font-display); text-transform:uppercase; font-size:12px; letter-spacing:0.08em; background:var(--court-navy); color:#fff; padding:4px 10px; border-radius:999px;">House · 5–6th</span>
    </div>
  </div>
  <div class="meta" style="margin-top:8px;">Paper card · default surface</div>
</div>
</body></html>
