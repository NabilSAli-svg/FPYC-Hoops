<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px;">
  <div class="row" style="gap:14px;">
    <div style="flex:1; min-width:200px;">
      <div style="height:104px; background:var(--court-navy); border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:12px; color:#fff;">
        <div>
          <div style="font-family:var(--font-display); text-transform:uppercase; font-size:18px; letter-spacing:0.04em;">Court Navy</div>
          <div class="hex" style="color:rgba(255,255,255,0.7); margin-top:2px;">#0A1F3D · --court-navy</div>
        </div>
      </div>
    </div>
    <div style="flex:1; min-width:200px;">
      <div style="height:104px; background:var(--varsity-gold); border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:12px; color:var(--court-navy);">
        <div>
          <div style="font-family:var(--font-display); text-transform:uppercase; font-size:18px; letter-spacing:0.04em;">Varsity Gold</div>
          <div class="hex" style="color:rgba(10,31,61,0.7); margin-top:2px;">#FFC72C · --varsity-gold</div>
        </div>
      </div>
    </div>
  </div>
  <div class="row" style="gap:8px;">
    <div style="flex:1; height:36px; background:var(--court-navy-900); border-radius:4px; display:flex; align-items:center; padding:0 10px; color:#fff; font-size:11px; font-family:var(--font-mono);">900 · #06152A</div>
    <div style="flex:1; height:36px; background:var(--court-navy-700); border-radius:4px; display:flex; align-items:center; padding:0 10px; color:#fff; font-size:11px; font-family:var(--font-mono);">700 · #143057</div>
    <div style="flex:1; height:36px; background:var(--varsity-gold-600); border-radius:4px; display:flex; align-items:center; padding:0 10px; color:var(--court-navy); font-size:11px; font-family:var(--font-mono);">600 · #E5B324</div>
    <div style="flex:1; height:36px; background:var(--varsity-gold-400); border-radius:4px; display:flex; align-items:center; padding:0 10px; color:var(--court-navy); font-size:11px; font-family:var(--font-mono);">400 · #FFD451</div>
  </div>
</div>
</body></html>
