<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="flex-direction:row; gap:18px; align-items:center;">
  <div style="background:var(--court-navy); color:#fff; border-radius:8px; padding:14px 18px; min-width:280px;">
    <div style="font-family:var(--font-body); font-weight:700; font-size:11px; letter-spacing:0.10em; text-transform:uppercase; color:var(--varsity-gold);">Q3 · 4:21</div>
    <div style="display:flex; align-items:baseline; justify-content:space-between; margin-top:6px;">
      <div style="font-family:var(--font-body); font-weight:500; font-size:14px;">Hawks</div>
      <div style="font-family:var(--font-display); font-size:36px; line-height:1; font-variant-numeric:tabular-nums;">48</div>
    </div>
    <div style="display:flex; align-items:baseline; justify-content:space-between; margin-top:2px;">
      <div style="font-family:var(--font-body); font-weight:500; font-size:14px; color:rgba(255,255,255,0.7);">Storm</div>
      <div style="font-family:var(--font-display); font-size:36px; line-height:1; color:rgba(255,255,255,0.7); font-variant-numeric:tabular-nums;">39</div>
    </div>
  </div>
  <div style="flex:1; border-left:1px solid var(--border); padding-left:18px;">
    <div class="meta" style="margin-bottom:6px;">Score chip</div>
    <div style="font-size:13px; color:var(--fg-soft); line-height:18px;">Used in the schedule ribbon and game cards. Anton numerals, leading team in gold-eyebrow context, trailing team muted.</div>
  </div>
</div>
</body></html>
