<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="flex-direction:row; align-items:center; gap:32px;">
  <div style="display:flex; align-items:center; gap:18px;">
    <div style="font-family:var(--font-display); font-size:88px; line-height:1; color:var(--court-navy); font-variant-numeric:tabular-nums;">68</div>
    <div style="font-family:var(--font-display); font-size:56px; line-height:1; color:var(--whistle-500); font-variant-numeric:tabular-nums;">54</div>
  </div>
  <div style="flex:1; border-left:1px solid var(--border); padding-left:24px;">
    <div class="meta" style="margin-bottom:6px;">Scoreboard numerals</div>
    <div style="font-size:13px; color:var(--fg-soft); line-height:18px;">Anton in tabular-nums for any score, jersey number, stat, or countdown. Always uppercase context.</div>
  </div>
</div>
</body></html>
