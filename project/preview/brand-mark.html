<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:var(--bg-alt); flex-direction:row; align-items:center; gap:32px; min-height:170px;">
  <div style="display:flex; flex-direction:column; gap:18px; align-items:center;">
    <img src="../assets/basketball-glyph.svg" alt="" style="width:72px; height:72px;">
    <div class="meta">Basketball mark</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:18px; align-items:center;">
    <div style="width:72px; height:72px; background:var(--court-navy); border-radius:50%; display:flex; align-items:center; justify-content:center;">
      <img src="../assets/basketball-glyph.svg" alt="" style="width:48px; height:48px;">
    </div>
    <div class="meta">On navy</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:18px; align-items:center;">
    <div style="width:72px; height:72px; background:var(--varsity-gold); border-radius:50%; display:flex; align-items:center; justify-content:center;">
      <img src="../assets/basketball-glyph.svg" alt="" style="width:48px; height:48px;">
    </div>
    <div class="meta">On gold</div>
  </div>
  <div style="flex:1; min-width:220px; border-left:1px solid var(--border); padding-left:24px;">
    <div class="meta" style="margin-bottom:8px;">Usage</div>
    <div style="font-size:13px; line-height:18px; color:var(--fg-soft);">Used for live-game pulse, brand moments, and as a favicon. Do not redraw or tint outside the live-game orange.</div>
  </div>
</div>
</body></html>
