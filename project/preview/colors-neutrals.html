<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:10px;">
  <div class="row" style="gap:10px;">
    <div style="flex:1;">
      <div style="height:72px; background:var(--net-white); border:1px solid var(--border); border-radius:var(--radius-md);"></div>
      <div class="meta" style="margin-top:6px;">Net White</div>
      <div class="hex">#FFFFFF · --net-white</div>
    </div>
    <div style="flex:1;">
      <div style="height:72px; background:var(--bone); border:1px solid var(--border); border-radius:var(--radius-md);"></div>
      <div class="meta" style="margin-top:6px;">Bone (page bg)</div>
      <div class="hex">#F7F4EC · --bone</div>
    </div>
    <div style="flex:1;">
      <div style="height:72px; background:var(--court-lines); border-radius:var(--radius-md);"></div>
      <div class="meta" style="margin-top:6px;">Court Lines</div>
      <div class="hex">#E4DECF · --court-lines</div>
    </div>
    <div style="flex:1;">
      <div style="height:72px; background:var(--whistle); border-radius:var(--radius-md);"></div>
      <div class="meta" style="margin-top:6px;">Whistle (body)</div>
      <div class="hex">#1A2436 · --whistle</div>
    </div>
  </div>
</div>
</body></html>
